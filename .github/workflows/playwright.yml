name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Playwright (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        suite: [smoke, e2e]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm run setup

      - name: Install Playwright system dependencies
        run: PLAYWRIGHT_BROWSERS_PATH=.playwright-browsers npx playwright install-deps chromium

      - name: Run ${{ matrix.suite }} tests
        run: npm run test:${{ matrix.suite }}
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-report-${{ matrix.suite }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: test-results-${{ matrix.suite }}
          path: test-results/
          retention-days: 14

  ai-unit:
    name: AI Failure Analyzer unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Run analyzer unit tests
        run: npm run test:ai
